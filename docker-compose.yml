# LectureDigest — local Docker Compose
# Usage:
#   docker compose up --build
#   Then open http://localhost:8000

services:
  app:
    build: .
    container_name: lecturedigest
    ports:
      - "8000:8000"
    env_file:
      - backend/.env          # reads GEMINI_API_KEY from your .env file
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
